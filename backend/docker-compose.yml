# ============================================================
# docker-compose.yml — Full MLOps stack
# Services: api, mlflow, prometheus, grafana
# ============================================================

version: "3.9"

services:

  # ──────────── FastAPI Application ────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eco-smart-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./mlruns.db:/app/mlruns.db:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - eco-net

  # ──────────── MLflow Server ────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: eco-smart-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlruns.db:/app/mlruns.db
    command: >
      mlflow server
      --backend-store-uri sqlite:///app/mlruns.db
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped
    networks:
      - eco-net

  # ──────────── Prometheus ────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: eco-smart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - eco-net

  # ──────────── Grafana ────────────
  grafana:
    image: grafana/grafana:latest
    container_name: eco-smart-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - eco-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  eco-net:
    driver: bridge
