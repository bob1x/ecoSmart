# ============================================================
# .github/workflows/ci.yml — CI pipeline for Eco-Smart Classifier
# Triggered on push and PR to main
# Jobs: lint, test, docker
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend   # All backend commands run from backend/

jobs:

  # ──────────── Linting ────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install black flake8 isort

      - name: Black (formatting)
        run: black --check src/ api/ tests/

      - name: Flake8 (style)
        run: flake8 src/ api/ tests/ --max-line-length=88

      - name: isort (imports)
        run: isort --check-only src/ api/ tests/

  # ──────────── Tests ────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ──────────── Docker Build & Test ────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t eco-smart-classifier .

      - name: Run API tests in container
        run: |
          docker run --rm eco-smart-classifier \
            pytest tests/test_api.py -v
